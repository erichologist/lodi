<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Gradient Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #1e40af;
            --accent: #ec4899;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #475569;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 420px;
            grid-template-rows: auto 1fr;
            height: 100vh;
            gap: 12px;
            padding: 12px;
        }

        .header {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .canvas-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section:last-child {
            border-bottom: none;
            flex-grow: 1;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-tertiary);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 16px rgba(59, 130, 246, 0.6);
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
        }

        input[type="range"]::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 16px rgba(59, 130, 246, 0.6);
        }

        .control-value {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .button-base {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .button-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .button-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .button-secondary:hover {
            background: var(--border);
        }

        .button-small {
            padding: 6px 10px;
            font-size: 11px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        input[type="color"] {
            width: 100%;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            background: var(--bg-tertiary);
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .color-input {
            display: flex;
            gap: 8px;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border);
            flex-shrink: 0;
            cursor: pointer;
        }

        .color-input input[type="color"] {
            flex: 1;
            height: 32px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .toggle {
            position: relative;
            width: 40px;
            height: 24px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: background 0.3s;
        }

        .toggle.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-color: var(--primary);
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: left 0.3s;
        }

        .toggle.active::after {
            left: 19px;
        }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .preset-btn {
            padding: 8px;
            font-size: 11px;
            text-align: center;
        }

        .stats-panel {
            background: var(--bg-tertiary);
            padding: 10px 12px;
            border-radius: 6px;
            font-family: 'Monaco', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
        }

        .stat-label {
            flex: 1;
        }

        .stat-value {
            font-weight: 600;
            color: var(--primary);
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .indicator-good { background: #10b981; }
        .indicator-fair { background: #f59e0b; }
        .indicator-poor { background: #ef4444; }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        select {
            width: 100%;
            padding: 8px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">🎨 Mesh Gradient Playground</div>
            <div class="header-controls">
                <button class="button-base button-secondary button-small" onclick="app.downloadPNG()">💾 Save</button>
                <button class="button-base button-secondary button-small" onclick="app.copyCode()">📋 Export</button>
            </div>
        </div>

        <!-- Canvas -->
        <div class="canvas-container">
            <canvas id="gradientCanvas"></canvas>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Animation Section -->
            <div class="sidebar-section">
                <div class="section-title">⏱️ Animation</div>
                
                <div class="control-group">
                    <div class="toggle-switch" onclick="app.toggleAnimation()">
                        <div class="toggle active" id="playToggle"></div>
                        <label style="margin: 0; cursor: pointer;"><span id="playStatus">Playing</span></label>
                    </div>
                </div>

                <div class="control-group">
                    <label>Speed</label>
                    <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
                    <div class="control-value">Speed: <span id="speedValue">1.0</span>×</div>
                </div>

                <div class="control-group">
                    <label>Time Scale</label>
                    <input type="range" id="timeScaleSlider" min="0.5" max="5" step="0.1" value="1">
                    <div class="control-value">Scale: <span id="timeScaleValue">1.0</span></div>
                </div>
            </div>

            <!-- Mesh Section -->
            <div class="sidebar-section">
                <div class="section-title">🔳 Mesh</div>
                
                <div class="control-group">
                    <label>Grid Density</label>
                    <input type="range" id="densitySlider" min="2" max="15" step="1" value="6">
                    <div class="control-value">Density: <span id="densityValue">6</span></div>
                </div>

                <div class="control-group">
                    <label>Vertex Warp</label>
                    <input type="range" id="warpSlider" min="0" max="100" step="5" value="50">
                    <div class="control-value">Warp: <span id="warpValue">50</span>%</div>
                </div>

                <div class="control-group">
                    <label>Distortion</label>
                    <input type="range" id="distortionSlider" min="0" max="1" step="0.05" value="0.5">
                    <div class="control-value">Amount: <span id="distortionValue">0.50</span></div>
                </div>

                <div class="control-group">
                    <label>Animation Mode</label>
                    <select id="modeSelect">
                        <option value="smooth">Smooth Waves</option>
                        <option value="chaotic">Chaotic Flow</option>
                        <option value="pulse">Pulse</option>
                        <option value="spiral">Spiral</option>
                        <option value="vortex">Vortex</option>
                    </select>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="sidebar-section">
                <div class="section-title">🎨 Colors</div>
                <div class="color-grid" id="colorGrid"></div>
                <div class="button-group" style="margin-top: 12px;">
                    <button class="button-base button-primary button-small" onclick="app.randomizeColors()">🎲 Random</button>
                </div>
            </div>

            <!-- Presets Section -->
            <div class="sidebar-section">
                <div class="section-title">⭐ Presets</div>
                <div class="preset-grid" id="presetGrid"></div>
            </div>

            <!-- Effects Section -->
            <div class="sidebar-section">
                <div class="section-title">✨ Effects</div>
                
                <div class="control-group">
                    <label>Blur</label>
                    <input type="range" id="blurSlider" min="0" max="20" step="1" value="0">
                    <div class="control-value">Blur: <span id="blurValue">0</span>px</div>
                </div>

                <div class="control-group">
                    <label>Noise</label>
                    <input type="range" id="noiseSlider" min="0" max="0.5" step="0.05" value="0">
                    <div class="control-value">Noise: <span id="noiseValue">0.00</span></div>
                </div>

                <div class="control-group">
                    <div class="toggle-switch" onclick="app.toggleGlow()">
                        <div class="toggle" id="glowToggle"></div>
                        <label style="margin: 0; cursor: pointer;">Glow</label>
                    </div>
                </div>

                <div class="control-group">
                    <div class="toggle-switch" onclick="app.toggleSaturate()">
                        <div class="toggle" id="saturateToggle"></div>
                        <label style="margin: 0; cursor: pointer;">Saturate</label>
                    </div>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="sidebar-section">
                <div class="section-title">📊 Performance</div>
                <div class="stats-panel">
                    <div class="stat-row">
                        <span class="stat-label">FPS</span>
                        <span class="stat-value" id="fpsStat">60</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Frame Time</span>
                        <span class="stat-value" id="frameStat">16ms</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value"><span class="status-indicator indicator-good" id="indicator"></span><span id="statusText">Good</span></span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="sidebar-section">
                <div class="section-title">⚙️ Actions</div>
                <button class="button-base button-secondary" style="width: 100%;" onclick="app.resetDefaults()">🔄 Reset to Defaults</button>
            </div>
        </div>
    </div>

    <!-- Code Modal -->
    <div class="modal" id="codeModal">
        <div class="modal-content">
            <div class="modal-title">Export Configuration</div>
            <textarea id="exportCode" style="width: 100%; height: 300px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: monospace; font-size: 12px; resize: none;"></textarea>
            <div style="margin-top: 16px; display: flex; gap: 8px;">
                <button class="button-base button-primary" onclick="app.copyToClipboard()">Copy</button>
                <button class="button-base button-secondary" onclick="document.getElementById('codeModal').classList.remove('active')">Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
