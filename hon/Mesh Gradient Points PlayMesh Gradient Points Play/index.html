<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Mesh Gradient Playground</title>
  <style>
    :root {
      --panel-bg: rgba(12, 13, 18, 0.82);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #eef2ff;
      --muted: #b9c1de;
      --accent: #8ab4ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: #090b10;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
    }
    #panel {
      position: absolute;
      right: 16px;
      top: 16px;
      width: min(360px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0.2px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin: 8px 0;
    }
    .row > label {
      font-size: 13px;
      color: var(--muted);
    }
    .row input[type="range"], .row select {
      width: 170px;
    }
    .hint {
      margin: 6px 0 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .value {
      min-width: 48px;
      text-align: right;
      font-size: 12px;
      color: #d9e3ff;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }
    button {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: rgba(255,255,255,0.14); }
    button.primary {
      border-color: rgba(138, 180, 255, 0.5);
      background: rgba(138, 180, 255, 0.2);
    }
    hr {
      border: 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 12px 0;
    }
    #pointsList {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    .point-item {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 12px;
    }
    .point-item.selected {
      border-color: rgba(138, 180, 255, 0.6);
      background: rgba(138, 180, 255, 0.18);
    }
    .point-swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.6);
    }
    .small {
      font-size: 11px;
      color: var(--muted);
    }
    @media (max-width: 740px) {
      #panel {
        left: 8px;
        right: 8px;
        top: auto;
        bottom: 8px;
        max-height: 54vh;
      }
      .row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .row input[type="range"], .row select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    <aside id="panel">
      <h1>Mesh Gradient Playground</h1>
      <div class="row">
        <label for="preset">Preset</label>
        <select id="preset">
          <option value="sunset">Sunset</option>
          <option value="aurora">Aurora</option>
          <option value="ocean">Ocean</option>
          <option value="candy">Candy</option>
        </select>
      </div>
      <div class="buttons">
        <button id="loadPreset" class="primary">Load Preset</button>
        <button id="randomize">Randomize</button>
        <button id="export">Export PNG</button>
      </div>
      <hr />
      <div class="row">
        <label for="animateToggle">Animate</label>
        <input id="animateToggle" type="checkbox" checked />
      </div>
      <div class="row">
        <label for="showHandles">Show Handles</label>
        <input id="showHandles" type="checkbox" checked />
      </div>
      <div class="row">
        <label for="speed">Speed</label>
        <input id="speed" type="range" min="0" max="2.5" step="0.01" value="0.55" />
        <div id="speedVal" class="value">0.55</div>
      </div>
      <div class="row">
        <label for="amplitude">Motion</label>
        <input id="amplitude" type="range" min="0" max="0.35" step="0.005" value="0.14" />
        <div id="ampVal" class="value">0.14</div>
      </div>
      <div class="row">
        <label for="radius">Blend Radius</label>
        <input id="radius" type="range" min="0.08" max="0.65" step="0.01" value="0.29" />
        <div id="radiusVal" class="value">0.29</div>
      </div>
      <div class="row">
        <label for="quality">Render Scale</label>
        <input id="quality" type="range" min="2" max="14" step="1" value="7" />
        <div id="qualityVal" class="value">7 px</div>
      </div>
      <div class="row">
        <label for="fps">Max FPS</label>
        <input id="fps" type="range" min="10" max="60" step="1" value="30" />
        <div id="fpsVal" class="value">30</div>
      </div>
      <div class="hint">Drag points directly on the canvas to sculpt the gradient.</div>
      <div class="buttons">
        <button id="addPoint">Add Point</button>
        <button id="removePoint">Remove Selected</button>
      </div>
      <div class="small">Point editor</div>
      <div id="pointsList"></div>
    </aside>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const offscreen = document.createElement("canvas");
      const offCtx = offscreen.getContext("2d", { willReadFrequently: true });

      const controls = {
        preset: document.getElementById("preset"),
        loadPreset: document.getElementById("loadPreset"),
        randomize: document.getElementById("randomize"),
        export: document.getElementById("export"),
        animateToggle: document.getElementById("animateToggle"),
        showHandles: document.getElementById("showHandles"),
        speed: document.getElementById("speed"),
        amplitude: document.getElementById("amplitude"),
        radius: document.getElementById("radius"),
        quality: document.getElementById("quality"),
        fps: document.getElementById("fps"),
        speedVal: document.getElementById("speedVal"),
        ampVal: document.getElementById("ampVal"),
        radiusVal: document.getElementById("radiusVal"),
        qualityVal: document.getElementById("qualityVal"),
        fpsVal: document.getElementById("fpsVal"),
        addPoint: document.getElementById("addPoint"),
        removePoint: document.getElementById("removePoint"),
        pointsList: document.getElementById("pointsList")
      };

      const presets = {
        sunset: ["#f72585", "#f15bb5", "#fee440", "#f8961e", "#577590", "#9b5de5"],
        aurora: ["#00f5d4", "#06d6a0", "#118ab2", "#073b4c", "#9b5de5", "#aaf683"],
        ocean: ["#03045e", "#0077b6", "#00b4d8", "#48cae4", "#90e0ef", "#caf0f8"],
        candy: ["#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#a0c4ff", "#bdb2ff"]
      };

      const state = {
        points: [],
        selectedId: null,
        draggingId: null,
        dragOffset: { x: 0, y: 0 },
        dpr: Math.max(1, Math.min(window.devicePixelRatio || 1, 2)),
        width: 0,
        height: 0,
        animationStart: performance.now(),
        lastFrame: 0
      };

      const hexToRgb = (hex) => {
        const h = hex.replace("#", "").trim();
        const normalized = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
        const v = parseInt(normalized, 16);
        return { r: (v >> 16) & 255, g: (v >> 8) & 255, b: v & 255 };
      };

      const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

      const randomColor = () => {
        const n = Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, "0");
        return `#${n}`;
      };

      function makePoint(x = Math.random(), y = Math.random(), color = randomColor()) {
        return {
          id: crypto.randomUUID(),
          x: clamp(x, 0, 1),
          y: clamp(y, 0, 1),
          baseX: clamp(x, 0, 1),
          baseY: clamp(y, 0, 1),
          color,
          freqX: 0.7 + Math.random() * 1.3,
          freqY: 0.7 + Math.random() * 1.3,
          phaseX: Math.random() * Math.PI * 2,
          phaseY: Math.random() * Math.PI * 2
        };
      }

      function resetPointsFromPalette(palette) {
        const count = palette.length;
        state.points = palette.map((color, i) => {
          const ring = 0.36;
          const angle = (i / count) * Math.PI * 2;
          const x = 0.5 + Math.cos(angle) * ring * (0.6 + Math.random() * 0.4);
          const y = 0.5 + Math.sin(angle) * ring * (0.6 + Math.random() * 0.4);
          return makePoint(clamp(x, 0.08, 0.92), clamp(y, 0.08, 0.92), color);
        });
        state.selectedId = state.points[0]?.id || null;
        refreshPointList();
      }

      function syncValueLabels() {
        controls.speedVal.textContent = Number(controls.speed.value).toFixed(2);
        controls.ampVal.textContent = Number(controls.amplitude.value).toFixed(3);
        controls.radiusVal.textContent = Number(controls.radius.value).toFixed(2);
        controls.qualityVal.textContent = `${controls.quality.value} px`;
        controls.fpsVal.textContent = controls.fps.value;
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        state.width = Math.max(1, Math.round(rect.width));
        state.height = Math.max(1, Math.round(rect.height));
        canvas.width = Math.round(state.width * state.dpr);
        canvas.height = Math.round(state.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      }

      function getAnimatedPoint(p, tSec) {
        if (!controls.animateToggle.checked) return { x: p.baseX, y: p.baseY };
        if (p.id === state.draggingId) return { x: p.baseX, y: p.baseY };
        const amp = Number(controls.amplitude.value);
        const speed = Number(controls.speed.value);
        return {
          x: clamp(p.baseX + Math.sin((tSec * speed * p.freqX) + p.phaseX) * amp, 0, 1),
          y: clamp(p.baseY + Math.cos((tSec * speed * p.freqY) + p.phaseY) * amp, 0, 1)
        };
      }

      function renderMesh(tSec) {
        const scale = Number(controls.quality.value);
        const ow = Math.max(1, Math.ceil(state.width / scale));
        const oh = Math.max(1, Math.ceil(state.height / scale));
        offscreen.width = ow;
        offscreen.height = oh;
        const image = offCtx.createImageData(ow, oh);
        const data = image.data;

        const radiusNorm = Number(controls.radius.value);
        const radiusPx = Math.max(1, radiusNorm * Math.min(ow, oh));
        const invTwoSigmaSq = 1 / (2 * radiusPx * radiusPx);
        const points = state.points.map((p) => {
          const c = hexToRgb(p.color);
          const pos = getAnimatedPoint(p, tSec);
          return { x: pos.x * ow, y: pos.y * oh, c };
        });

        let idx = 0;
        for (let y = 0; y < oh; y++) {
          for (let x = 0; x < ow; x++) {
            let sumW = 0;
            let rr = 0, gg = 0, bb = 0;
            for (let i = 0; i < points.length; i++) {
              const pt = points[i];
              const dx = x - pt.x;
              const dy = y - pt.y;
              const w = Math.exp(-(dx * dx + dy * dy) * invTwoSigmaSq);
              sumW += w;
              rr += pt.c.r * w;
              gg += pt.c.g * w;
              bb += pt.c.b * w;
            }
            if (sumW < 1e-8) sumW = 1e-8;
            data[idx++] = rr / sumW;
            data[idx++] = gg / sumW;
            data[idx++] = bb / sumW;
            data[idx++] = 255;
          }
        }
        offCtx.putImageData(image, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(offscreen, 0, 0, ow, oh, 0, 0, state.width, state.height);
      }

      function drawHandles(tSec) {
        if (!controls.showHandles.checked) return;
        ctx.save();
        ctx.lineWidth = 1.2;
        state.points.forEach((p) => {
          const pos = getAnimatedPoint(p, tSec);
          const x = pos.x * state.width;
          const y = pos.y * state.height;
          const selected = p.id === state.selectedId;
          ctx.strokeStyle = selected ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.6)";
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(x, y, selected ? 8 : 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
        });
        ctx.restore();
      }

      function refreshPointList() {
        controls.pointsList.innerHTML = "";
        state.points.forEach((p, i) => {
          const item = document.createElement("div");
          item.className = `point-item ${p.id === state.selectedId ? "selected" : ""}`;

          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = "selectedPoint";
          radio.checked = p.id === state.selectedId;
          radio.addEventListener("change", () => {
            state.selectedId = p.id;
            refreshPointList();
          });

          const label = document.createElement("div");
          label.textContent = `Point ${i + 1}`;

          const color = document.createElement("input");
          color.type = "color";
          color.value = p.color;
          color.addEventListener("input", (e) => {
            p.color = e.target.value;
            swatch.style.background = p.color;
          });

          const swatch = document.createElement("div");
          swatch.className = "point-swatch";
          swatch.style.background = p.color;

          item.addEventListener("click", () => {
            state.selectedId = p.id;
            refreshPointList();
          });

          item.append(radio, label, color, swatch);
          controls.pointsList.append(item);
        });
      }

      function pointerToNorm(evt) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: clamp((evt.clientX - rect.left) / rect.width, 0, 1),
          y: clamp((evt.clientY - rect.top) / rect.height, 0, 1)
        };
      }

      function findNearestPoint(nx, ny, thresholdPx = 20) {
        const tx = thresholdPx / state.width;
        const ty = thresholdPx / state.height;
        let best = null;
        let bestDist = Infinity;
        for (const p of state.points) {
          const dx = nx - p.baseX;
          const dy = ny - p.baseY;
          const d = (dx / tx) ** 2 + (dy / ty) ** 2;
          if (d < bestDist) {
            bestDist = d;
            best = p;
          }
        }
        return bestDist <= 1 ? best : null;
      }

      function addRandomPoint() {
        if (state.points.length >= 16) return;
        const p = makePoint();
        state.points.push(p);
        state.selectedId = p.id;
        refreshPointList();
      }

      function removeSelectedPoint() {
        if (state.points.length <= 2) return;
        const id = state.selectedId || state.points[state.points.length - 1].id;
        const idx = state.points.findIndex((p) => p.id === id);
        if (idx === -1) return;
        state.points.splice(idx, 1);
        state.selectedId = state.points[Math.max(0, idx - 1)]?.id || state.points[0]?.id || null;
        refreshPointList();
      }

      function randomizeLayout() {
        state.points.forEach((p) => {
          p.baseX = Math.random();
          p.baseY = Math.random();
          p.color = randomColor();
          p.freqX = 0.7 + Math.random() * 1.3;
          p.freqY = 0.7 + Math.random() * 1.3;
          p.phaseX = Math.random() * Math.PI * 2;
          p.phaseY = Math.random() * Math.PI * 2;
        });
        refreshPointList();
      }

      function savePng() {
        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        const stamp = new Date().toISOString().replace(/[:.]/g, "-");
        link.download = `mesh-gradient-${stamp}.png`;
        link.click();
      }

      function frame(now) {
        const maxFps = Number(controls.fps.value);
        const minDelta = 1000 / maxFps;
        if (now - state.lastFrame >= minDelta) {
          const tSec = (now - state.animationStart) / 1000;
          renderMesh(tSec);
          drawHandles(tSec);
          state.lastFrame = now;
        }
        requestAnimationFrame(frame);
      }

      controls.loadPreset.addEventListener("click", () => {
        resetPointsFromPalette(presets[controls.preset.value]);
      });
      controls.randomize.addEventListener("click", randomizeLayout);
      controls.export.addEventListener("click", savePng);
      controls.addPoint.addEventListener("click", addRandomPoint);
      controls.removePoint.addEventListener("click", removeSelectedPoint);

      [controls.speed, controls.amplitude, controls.radius, controls.quality, controls.fps]
        .forEach((input) => input.addEventListener("input", syncValueLabels));

      canvas.addEventListener("pointerdown", (evt) => {
        const n = pointerToNorm(evt);
        const hit = findNearestPoint(n.x, n.y);
        if (hit) {
          state.draggingId = hit.id;
          state.selectedId = hit.id;
          state.dragOffset.x = n.x - hit.baseX;
          state.dragOffset.y = n.y - hit.baseY;
          canvas.setPointerCapture(evt.pointerId);
          refreshPointList();
        } else if (evt.shiftKey) {
          const p = makePoint(n.x, n.y);
          state.points.push(p);
          state.selectedId = p.id;
          refreshPointList();
        }
      });

      canvas.addEventListener("pointermove", (evt) => {
        if (!state.draggingId) return;
        const p = state.points.find((pt) => pt.id === state.draggingId);
        if (!p) return;
        const n = pointerToNorm(evt);
        p.baseX = clamp(n.x - state.dragOffset.x, 0, 1);
        p.baseY = clamp(n.y - state.dragOffset.y, 0, 1);
      });

      canvas.addEventListener("pointerup", () => { state.draggingId = null; });
      canvas.addEventListener("pointercancel", () => { state.draggingId = null; });

      window.addEventListener("resize", resize, { passive: true });

      syncValueLabels();
      resetPointsFromPalette(presets.sunset);
      resize();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
